name: technical_docs
version: "1.0.0"
description: >
  Evaluates LLM-generated technical documentation for accuracy,
  completeness, code quality, readability, and reference standards.
author: eval-kit
license: proprietary
filters:
  - rubric: accuracy
    weight: 0.22
    scoring_mode: penalty
  - rubric: completeness
    weight: 0.20
    scoring_mode: additive
  - rubric: code_examples
    weight: 0.18
    scoring_mode: additive
  - rubric: readability
    weight: 0.15
    scoring_mode: additive
  - rubric: versioning
    weight: 0.12
    scoring_mode: additive
  - rubric: api_reference
    weight: 0.13
    scoring_mode: additive
thresholds:
  pass: 0.78
  partial: 0.50
  fail: 0.0
