name: escalation_detection
description: >
  Detects whether the response appropriately identifies and handles
  escalation signals from the customer.

scoring:
  mode: keyword_coverage

  positive_signals:
    - "let me connect you"
    - "escalate"
    - "transfer you to"
    - "supervisor"
    - "manager"
    - "specialist"
    - "priority"
    - "right away"
    - "immediately"
    - "senior"
    - "tier 2"
    - "dedicated team"

  negative_signals:
    - "nothing I can do"
    - "not my department"
    - "call back later"
    - "can't help"
    - "that's not possible"
    - "outside my scope"

  expected_min_hits: 2
  negative_penalty: 0.30
